name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test
  ELIXIR_VERSION: '1.18.3'
  OTP_VERSION: '27.3'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: astra_auto_ex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Setup database
        run: mix ecto.setup
        env:
          DATABASE_URL: ecto://postgres:postgres@localhost/astra_auto_ex_test

      - name: Run unit tests
        run: mix test --exclude feature
        env:
          DATABASE_URL: ecto://postgres:postgres@localhost/astra_auto_ex_test

      - name: Install chromedriver
        uses: nanasess/setup-chromedriver@v2

      - name: Run browser tests
        run: mix test --only feature
        env:
          DATABASE_URL: ecto://postgres:postgres@localhost/astra_auto_ex_test

      - name: Check formatting
        run: mix format --check-formatted

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t astra-auto-ex .

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: astra_auto_ex_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ecto://postgres:postgres@postgres/astra_auto_ex_prod
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-please-change-me-in-production-use-mix-phx-gen-secret}
      PHX_HOST: ${PHX_HOST:-localhost}
      PHX_SERVER: "true"
      PORT: "4000"
      STORAGE_TYPE: "local"
      UPLOAD_DIR: "/app/uploads"
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
